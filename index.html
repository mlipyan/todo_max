<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max.Space</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e12;
    --surface: #16161d;
    --surface-hover: #1e1e28;
    --border: #2a2a38;
    --text: #e8e6f0;
    --text-dim: #7a7890;
    --accent: #c4f04d;
    --accent-dim: rgba(196, 240, 77, 0.1);
    --accent2: #6c8cff;
    --accent2-dim: rgba(108, 140, 255, 0.1);
    --danger: #f04d6a;
    --danger-dim: rgba(240, 77, 106, 0.08);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    background-image:
      radial-gradient(ellipse 600px 400px at 20% 10%, rgba(196, 240, 77, 0.04), transparent),
      radial-gradient(ellipse 500px 500px at 80% 80%, rgba(100, 80, 200, 0.04), transparent);
  }

  .app {
    width: 100%;
    max-width: 540px;
    position: relative;
    padding: 32px 28px;
    border: 1.5px solid rgba(196, 240, 77, 0.15);
    border-radius: 4px;
    background: var(--bg);
  }

  /* Art Deco outer frame */
  .app::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(196, 240, 77, 0.08);
    border-radius: 2px;
    pointer-events: none;
  }

  /* Art Deco corner accents */
  .app::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      /* Top-left corner */
      linear-gradient(135deg, rgba(196, 240, 77, 0.2) 0px, rgba(196, 240, 77, 0.2) 1px, transparent 1px) no-repeat 12px 12px / 20px 20px,
      linear-gradient(135deg, rgba(108, 140, 255, 0.15) 0px, rgba(108, 140, 255, 0.15) 1px, transparent 1px) no-repeat 12px 12px / 14px 14px,
      /* Top-right corner */
      linear-gradient(225deg, rgba(196, 240, 77, 0.2) 0px, rgba(196, 240, 77, 0.2) 1px, transparent 1px) no-repeat calc(100% - 12px) 12px / 20px 20px,
      linear-gradient(225deg, rgba(108, 140, 255, 0.15) 0px, rgba(108, 140, 255, 0.15) 1px, transparent 1px) no-repeat calc(100% - 12px) 12px / 14px 14px,
      /* Bottom-left corner */
      linear-gradient(45deg, rgba(196, 240, 77, 0.2) 0px, rgba(196, 240, 77, 0.2) 1px, transparent 1px) no-repeat 12px calc(100% - 12px) / 20px 20px,
      linear-gradient(45deg, rgba(108, 140, 255, 0.15) 0px, rgba(108, 140, 255, 0.15) 1px, transparent 1px) no-repeat 12px calc(100% - 12px) / 14px 14px,
      /* Bottom-right corner */
      linear-gradient(315deg, rgba(196, 240, 77, 0.2) 0px, rgba(196, 240, 77, 0.2) 1px, transparent 1px) no-repeat calc(100% - 12px) calc(100% - 12px) / 20px 20px,
      linear-gradient(315deg, rgba(108, 140, 255, 0.15) 0px, rgba(108, 140, 255, 0.15) 1px, transparent 1px) no-repeat calc(100% - 12px) calc(100% - 12px) / 14px 14px,
      /* Top & bottom center deco lines */
      linear-gradient(90deg, transparent 20%, rgba(196, 240, 77, 0.1) 35%, rgba(196, 240, 77, 0.18) 48%, rgba(196, 240, 77, 0.25) 50%, rgba(196, 240, 77, 0.18) 52%, rgba(196, 240, 77, 0.1) 65%, transparent 80%) no-repeat center 4px / 60% 1px,
      linear-gradient(90deg, transparent 20%, rgba(108, 140, 255, 0.08) 35%, rgba(108, 140, 255, 0.15) 50%, rgba(108, 140, 255, 0.08) 65%, transparent 80%) no-repeat center calc(100% - 4px) / 60% 1px,
      /* Side deco lines */
      linear-gradient(180deg, transparent 25%, rgba(196, 240, 77, 0.08) 40%, rgba(196, 240, 77, 0.12) 50%, rgba(196, 240, 77, 0.08) 60%, transparent 75%) no-repeat 4px center / 1px 40%,
      linear-gradient(180deg, transparent 25%, rgba(108, 140, 255, 0.08) 40%, rgba(108, 140, 255, 0.12) 50%, rgba(108, 140, 255, 0.08) 60%, transparent 75%) no-repeat calc(100% - 4px) center / 1px 40%;
  }

  /* Stepped deco diamonds at top center */
  .deco-top {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 4px;
    padding-top: 2px;
  }
  .deco-top .diamond {
    width: 6px; height: 6px;
    transform: rotate(45deg);
    opacity: 0.3;
  }
  .deco-top .diamond:nth-child(1) { background: var(--accent); width: 4px; height: 4px; opacity: 0.2; }
  .deco-top .diamond:nth-child(2) { background: var(--accent); opacity: 0.35; }
  .deco-top .diamond:nth-child(3) { background: var(--accent2); width: 5px; height: 5px; opacity: 0.25; }
  .deco-top .diamond:nth-child(4) { background: var(--accent); opacity: 0.35; }
  .deco-top .diamond:nth-child(5) { background: var(--accent); width: 4px; height: 4px; opacity: 0.2; }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeUp 0.3s ease-out; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideOut {
    to { opacity: 0; transform: translateX(12px); height: 0; padding: 0; margin: 0; border-width: 0; overflow: hidden; }
  }

  /* ── Back Button ── */
  .back-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-bottom: 24px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .back-arrow { display: inline-block; transition: transform 0.2s; }
  .back-btn:hover .back-arrow { transform: translateX(-3px); }

  /* ── Screen Back Title (project name as nav) ── */
  .screen-back-title {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    padding: 0;
    margin-bottom: 20px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.6rem;
    letter-spacing: -0.5px;
    line-height: 1;
    color: var(--text);
    transition: color 0.2s;
  }
  .screen-back-title::before {
    content: '←';
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--text-dim);
    transition: transform 0.2s, color 0.2s;
  }
  .screen-back-title:hover { color: var(--accent); }
  .screen-back-title:hover::before { transform: translateX(-3px); color: var(--accent); }

  .sub-header { margin-bottom: 28px; }
  .sub-header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.1rem;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .sub-header .subtitle { color: var(--text-dim); font-size: 0.88rem; }

  .breadcrumb {
    color: var(--text-dim);
    font-size: 0.78rem;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }
  .breadcrumb span { opacity: 0.5; margin: 0 5px; }

  /* ══════════════════════════════
     PROJECTS SCREEN
  ══════════════════════════════ */
  .projects-header {
    text-align: center;
    padding-top: 12px;
    margin-bottom: 36px;
  }
  .projects-header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.8rem;
    letter-spacing: -1.5px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .projects-header h1 .dot1 { color: var(--accent); }
  .projects-header h1 .dot2 { color: var(--accent2); }
  .projects-header .subtitle { color: var(--text-dim); font-size: 0.95rem; }

  .current-date {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    margin-bottom: 20px;
    text-transform: uppercase;
    text-align: center;
  }

  .date-input {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    color-scheme: dark;
    width: 140px;
    flex-shrink: 0;
  }
  .date-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

  /* ── Upcoming Section ── */
  .upcoming-section {
    margin-top: 36px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
  }
  .upcoming-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text-dim);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .upcoming-title .upcoming-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
  }
  .upcoming-icon svg { width: 28px; height: 28px; }

  .upcoming-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .upcoming-item:hover { background: var(--surface-hover); border-color: #35354a; }

  .upcoming-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .upcoming-info { flex: 1; min-width: 0; }
  .upcoming-task-text {
    font-size: 0.88rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .upcoming-project-label {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 1px;
  }
  .upcoming-due {
    font-size: 0.75rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .upcoming-due.overdue { background: var(--danger-dim); color: var(--danger); }
  .upcoming-due.today { background: rgba(250, 204, 21, 0.12); color: #facc15; }
  .upcoming-due.soon { background: var(--accent-dim); color: var(--accent); }

  .todo-due-badge {
    font-size: 0.72rem;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 20px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .todo-due-badge.overdue { background: var(--danger-dim); color: var(--danger); }
  .todo-due-badge.today { background: rgba(250, 204, 21, 0.12); color: #facc15; }
  .todo-due-badge.soon { background: var(--accent-dim); color: var(--accent); }
  .todo-due-badge.later { background: rgba(122, 120, 144, 0.1); color: var(--text-dim); }

  .add-project-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px; height: 48px;
    margin: 20px auto 0;
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: 50%;
    color: var(--text-dim);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.15s;
  }
  .add-project-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); transform: scale(1.08); }
  .add-project-btn:active { transform: scale(0.95); }
  .add-project-plus { font-size: 1.5rem; font-weight: 300; line-height: 1; }

  .text-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 13px 18px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .text-input::placeholder { color: var(--text-dim); }
  .text-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .text-input.blue-focus:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px var(--accent2-dim); }

  .btn {
    border: none;
    border-radius: 12px;
    padding: 0 22px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    white-space: nowrap;
  }
  .btn:hover { transform: scale(1.04); }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn.green { background: var(--accent); color: var(--bg); }
  .btn.blue { background: var(--accent2); color: #fff; }

  .projects-list { display: flex; flex-direction: column; gap: 8px; }

  .project-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 18px 18px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    position: relative;
  }
  .project-card:hover { background: var(--surface-hover); border-color: #35354a; }
  .project-card:active { transform: scale(0.99); }
  .project-card.new { animation: slideIn 0.3s ease-out; }
  .project-card.removing { animation: slideOut 0.25s ease-in forwards; pointer-events: none; }

  /* Drag handle */
  .drag-handle {
    color: var(--text-dim);
    font-size: 1rem;
    cursor: grab;
    opacity: 0;
    transition: opacity 0.2s;
    flex-shrink: 0;
    user-select: none;
    padding: 2px;
    letter-spacing: 1px;
  }
  .project-card:hover .drag-handle { opacity: 0.5; }
  .drag-handle:hover { opacity: 1 !important; color: var(--accent); }
  .drag-handle:active { cursor: grabbing; }

  /* Drag states */
  .project-card.dragging {
    opacity: 0.4;
    border-style: dashed;
  }
  .project-card.drag-above {
    box-shadow: 0 -2px 0 0 var(--accent);
  }
  .project-card.drag-below {
    box-shadow: 0 2px 0 0 var(--accent);
  }

  .project-color {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .project-info { flex: 1; min-width: 0; }
  .project-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .project-meta {
    color: var(--text-dim);
    font-size: 0.78rem;
    margin-top: 2px;
  }

  .project-arrow {
    color: var(--text-dim);
    font-size: 1.1rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .project-card:hover .project-arrow { transform: translateX(3px); }

  .project-delete {
    background: none; border: none;
    color: var(--text-dim);
    cursor: pointer; padding: 6px;
    border-radius: 6px; opacity: 0;
    transition: all 0.2s;
    font-size: 1rem; line-height: 1; flex-shrink: 0;
    z-index: 2;
  }
  .project-card:hover .project-delete { opacity: 1; }
  .project-delete:hover { color: var(--danger); background: var(--danger-dim); }

  .project-card.confirming { border-color: var(--danger); background: var(--danger-dim); }

  .confirm-del-btn {
    border: none;
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    flex-shrink: 0;
    z-index: 2;
  }
  .confirm-del-btn:hover { opacity: 0.85; }
  .confirm-del-btn.yes { background: var(--danger); color: #fff; }
  .confirm-del-btn.no { background: var(--border); color: var(--text-dim); }

  /* ══════════════════════════════
     WORKSPACE SCREEN (Todos / Notes)
  ══════════════════════════════ */
  .workspace-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .ws-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 30px 22px;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    text-align: center;
  }
  .ws-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
  .ws-card.todos:hover { border-color: var(--accent); }
  .ws-card.notes:hover { border-color: var(--accent2); }

  .ws-card .card-icon { font-size: 2.4rem; margin-bottom: 14px; line-height: 1; }
  .ws-card .card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; margin-bottom: 5px; }
  .ws-card.todos .card-title { color: var(--accent); }
  .ws-card.notes .card-title { color: var(--accent2); }
  .ws-card .card-desc { color: var(--text-dim); font-size: 0.8rem; line-height: 1.4; }

  .ws-card .card-badge {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.74rem;
    font-weight: 500;
  }
  .ws-card.todos .card-badge { background: var(--accent-dim); color: var(--accent); }
  .ws-card.notes .card-badge { background: var(--accent2-dim); color: var(--accent2); }

  /* ══════════════════════════════
     TODOS
  ══════════════════════════════ */
  .input-row { display: flex; gap: 10px; margin-bottom: 24px; }

  .filters { display: flex; gap: 6px; margin-bottom: 18px; }
  .filters button {
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .filters button:hover { border-color: var(--text-dim); color: var(--text); }
  .filters button.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .count {
    margin-left: auto;
    display: flex; align-items: center;
    font-size: 0.8rem; color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  .add-task-inline {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .add-task-inline:hover { transform: scale(1.04); }
  .add-task-inline:active { transform: scale(0.97); opacity: 0.85; }

  .todo-list { display: flex; flex-direction: column; gap: 8px; }

  .todo-item {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px; padding: 13px 16px;
    transition: background 0.2s, border-color 0.2s, opacity 0.2s;
  }
  .todo-item.new { animation: slideIn 0.3s ease-out; }
  .todo-item:hover { background: var(--surface-hover); border-color: #35354a; }
  .todo-item.done { opacity: 0.5; }
  .todo-item.done .todo-text { text-decoration: line-through; color: var(--text-dim); }
  .todo-item.done .todo-content:hover .todo-text { color: var(--text-dim); }
  .todo-item.done .todo-details { text-decoration: line-through; }
  .todo-item.removing { animation: slideOut 0.25s ease-in forwards; }

  .check {
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-radius: 6px;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .check:hover { border-color: var(--accent); }
  .check.checked { background: var(--accent); border-color: var(--accent); }
  .check.checked::after {
    content: ''; width: 6px; height: 10px;
    border: solid var(--bg); border-width: 0 2.5px 2.5px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .todo-content { flex: 1; min-width: 0; cursor: pointer; }
  .todo-content:hover .todo-text { color: var(--accent); }
  .todo-text { font-size: 0.93rem; line-height: 1.4; word-break: break-word; transition: color 0.15s; }
  .todo-details {
    font-size: 0.8rem;
    line-height: 1.4;
    color: var(--text-dim);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .del-btn {
    background: none; border: none;
    color: var(--text-dim); cursor: pointer;
    padding: 4px; border-radius: 6px;
    opacity: 0; transition: all 0.2s;
    font-size: 1.05rem; line-height: 1; flex-shrink: 0;
  }
  .todo-item:hover .del-btn, .note-card:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--danger); background: var(--danger-dim); }

  /* ══════════════════════════════
     NOTES
  ══════════════════════════════ */
  .note-input-area { margin-bottom: 24px; display: flex; flex-direction: column; gap: 10px; }
  .note-input-area .row { display: flex; gap: 10px; }

  .note-input-area textarea {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 13px 18px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; outline: none;
    resize: vertical; min-height: 80px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .note-input-area textarea::placeholder { color: var(--text-dim); }
  .note-input-area textarea:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px var(--accent2-dim); }

  .notes-list { display: flex; flex-direction: column; gap: 10px; }

  .note-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px 14px;
    transition: background 0.2s, border-color 0.2s;
    position: relative;
  }
  .note-card.new { animation: slideIn 0.3s ease-out; }
  .note-card:hover { background: var(--surface-hover); border-color: #35354a; }
  .note-card:hover .note-title { color: #8da8ff; }
  .note-card.removing { animation: slideOut 0.25s ease-in forwards; }

  .note-card .note-title {
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 1rem; margin-bottom: 5px;
    color: var(--accent2); padding-right: 28px;
    transition: color 0.15s;
  }
  .note-card .note-body {
    font-size: 0.86rem; line-height: 1.55;
    color: var(--text-dim); white-space: pre-wrap; word-break: break-word;
  }
  .note-card .note-time { font-size: 0.72rem; color: #4a4860; margin-top: 8px; }
  .note-card .del-btn { position: absolute; top: 12px; right: 12px; }

  /* ── Add Note Button ── */
  .add-note-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 14px;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.93rem;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    margin-bottom: 24px;
  }
  .add-note-btn:hover { border-color: var(--accent2); color: var(--accent2); background: var(--accent2-dim); }
  .add-note-plus { font-size: 1.2rem; font-weight: 700; line-height: 1; }

  .modal-textarea-blue:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px var(--accent2-dim); }

  /* ── Calendar Toggle ── */
  .cal-toggle-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    margin-left: auto;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    width: 36px; height: 36px;
  }
  .cal-toggle-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
  .cal-toggle-btn svg { width: 24px; height: 24px; }

  /* ── Calendar Modal ── */
  .cal-modal { max-width: 380px; }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 22px 8px;
  }
  .cal-nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    width: 32px; height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cal-month-label {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--text);
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    padding: 8px 18px 4px;
  }

  .cal-header-cell {
    text-align: center;
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--text-dim);
    padding: 4px 0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .cal-cell {
    text-align: center;
    padding: 6px 2px 4px;
    border-radius: 8px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    position: relative;
    min-height: 38px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    color: var(--text-dim);
  }
  .cal-cell:hover { background: var(--surface-hover); }
  .cal-cell.today { color: var(--accent); font-weight: 700; }
  .cal-cell.selected { background: var(--accent-dim); color: var(--accent); }
  .cal-cell.other-month { opacity: 0.25; }
  .cal-cell.has-tasks { color: var(--text); }

  .cal-day-num { line-height: 1; margin-bottom: 3px; }

  .cal-dots {
    display: flex;
    gap: 3px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 100%;
  }
  .cal-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Day Tasks Panel ── */
  .cal-day-tasks {
    padding: 0 18px 16px;
    max-height: 200px;
    overflow-y: auto;
  }

  .cal-day-header {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--text-dim);
    padding: 10px 0 8px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .cal-task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-size: 0.85rem;
  }
  .cal-task-item:hover { background: var(--surface-hover); border-color: #35354a; }
  .cal-task-item.done { opacity: 0.45; text-decoration: line-through; }

  .cal-task-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cal-task-info { flex: 1; min-width: 0; }
  .cal-task-text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cal-task-project {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 1px;
  }
  .cal-no-tasks {
    color: var(--text-dim);
    font-size: 0.82rem;
    text-align: center;
    padding: 16px 0;
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; animation: modalFadeIn 0.2s ease-out; }

  @keyframes modalFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes modalSlideUp {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    width: 100%;
    max-width: 420px;
    animation: modalSlideUp 0.25s ease-out;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 22px 0;
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.15rem;
    color: var(--accent);
  }
  .modal-close {
    background: none; border: none;
    color: var(--text-dim);
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body {
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .modal-label {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-dim);
    margin-top: 6px;
  }
  .modal-label:first-child { margin-top: 0; }
  .modal-label .required { color: var(--danger); }
  .modal-label .optional { opacity: 0.5; font-weight: 400; }

  .modal-input { width: 100%; flex: none; }

  .modal-textarea {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    resize: vertical;
    min-height: 64px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .modal-textarea::placeholder { color: var(--text-dim); }
  .modal-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

  .modal-date { width: 100%; flex: none; }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding: 0 22px 20px;
  }
  .modal-cancel {
    background: var(--surface);
    color: var(--text-dim);
    border: 1.5px solid var(--border);
  }
  .modal-cancel:hover { border-color: var(--text-dim); color: var(--text); transform: none; }

  /* ── Empty ── */
  .empty { text-align: center; padding: 50px 20px; color: var(--text-dim); }
  .empty-icon { font-size: 2.2rem; margin-bottom: 10px; opacity: 0.4; }
  .empty p { font-size: 0.88rem; }
  /* ── Mobile / iPhone Responsive ── */
  @media (max-width: 480px) {
    body { padding: 16px 10px; }
    .app { padding: 24px 18px; }

    .projects-header { padding-top: 16px; margin-bottom: 28px; }
    .projects-header h1 { font-size: 2.2rem; }
    .current-date { font-size: 0.78rem; margin-bottom: 10px; }

    .projects-header { padding-top: 8px; margin-bottom: 24px; }
    .text-input { padding: 12px 14px; font-size: 0.9rem; }
    .btn { padding: 0 16px; font-size: 0.88rem; }

    .project-card { padding: 14px 14px; gap: 12px; }
    .project-name { font-size: 0.95rem; }
    .project-meta { font-size: 0.72rem; }

    .home-cards, .workspace-cards { grid-template-columns: 1fr 1fr; gap: 10px; }
    .ws-card { padding: 22px 16px; }
    .ws-card .card-icon { font-size: 2rem; margin-bottom: 10px; }
    .ws-card .card-title { font-size: 1.05rem; }
    .ws-card .card-desc { font-size: 0.75rem; }

    .sub-header h1 { font-size: 1.8rem; }
    .sub-header .subtitle { font-size: 0.82rem; }
    .breadcrumb { font-size: 0.72rem; }

    .filters { gap: 4px; }
    .filters button { padding: 6px 11px; font-size: 0.75rem; }
    .count { font-size: 0.75rem; }

    .todo-item { padding: 12px 12px; gap: 10px; }
    .todo-text { font-size: 0.88rem; }
    .todo-details { font-size: 0.75rem; }
    .todo-due-badge { font-size: 0.68rem; padding: 2px 7px; }
    .check { width: 20px; height: 20px; }

    .add-task-inline { padding: 6px 10px; font-size: 0.75rem; }
    .add-note-btn { padding: 12px; font-size: 0.88rem; }

    .cal-modal { max-width: 100%; }
    .cal-nav { padding: 10px 16px 6px; }
    .cal-grid { padding: 6px 12px 4px; }
    .cal-cell { min-height: 34px; font-size: 0.76rem; padding: 4px 1px 3px; }
    .cal-dot { width: 4px; height: 4px; }
    .cal-day-tasks { padding: 0 14px 12px; }
    .cal-toggle-btn { width: 32px; height: 32px; }
    .cal-toggle-btn svg { width: 20px; height: 20px; }

    .note-card { padding: 14px 14px 12px; }
    .note-card .note-title { font-size: 0.92rem; }
    .note-card .note-body { font-size: 0.82rem; }

    .note-input-area textarea { min-height: 60px; font-size: 0.85rem; padding: 12px 14px; }

    .upcoming-section { margin-top: 28px; padding-top: 22px; }
    .upcoming-item { padding: 10px 12px; gap: 10px; }
    .upcoming-task-text { font-size: 0.82rem; }
    .upcoming-project-label { font-size: 0.68rem; }
    .upcoming-due { font-size: 0.7rem; padding: 3px 8px; }
    .upcoming-title { font-size: 0.88rem; }

    .back-btn { padding: 7px 12px; font-size: 0.8rem; margin-bottom: 18px; }
    .screen-back-title { font-size: 1.3rem; margin-bottom: 16px; }
    .screen-back-title::before { font-size: 0.8rem; }

    /* Modal */
    .modal { border-radius: 14px; margin: 10px; }
    .modal-header { padding: 16px 18px 0; }
    .modal-title { font-size: 1.05rem; }
    .modal-body { padding: 16px 18px; }
    .modal-footer { padding: 0 18px 16px; }
    .modal-textarea { min-height: 56px; }
    .modal-label { font-size: 0.76rem; }

    .confirm-del-btn { padding: 5px 11px; font-size: 0.75rem; }
  }

  @media (max-width: 374px) {
    .app { padding: 20px 14px; }
    .projects-header h1 { font-size: 1.9rem; }
    .ws-card { padding: 18px 12px; }
    .ws-card .card-icon { font-size: 1.7rem; }
    .ws-card .card-title { font-size: 0.95rem; }
    .filters button { padding: 5px 8px; font-size: 0.7rem; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="deco-top">
    <div class="diamond"></div>
    <div class="diamond"></div>
    <div class="diamond"></div>
    <div class="diamond"></div>
    <div class="diamond"></div>
  </div>

  <!-- ═══ PROJECTS ═══ -->
  <div class="screen active" id="projectsScreen">
    <div class="current-date" id="currentDate"></div>
    <div class="projects-list" id="projectsList"></div>
    <button class="add-project-btn" onclick="openProjectModal()">
      <span class="add-project-plus">+</span>
    </button>
    <div id="upcomingSection"></div>
  </div>

  <!-- ═══ WORKSPACE ═══ -->
  <div class="screen" id="workspaceScreen">
    <button class="back-btn" onclick="goTo('projects')"><span class="back-arrow">←</span> Projects</button>
    <div class="sub-header">
      <h1 id="wsTitle"></h1>
      <div class="subtitle">Choose a tool</div>
    </div>
    <div class="workspace-cards">
      <div class="ws-card todos" onclick="goTo('todos')">
        <div class="card-icon">✓</div>
        <div class="card-title">Todos</div>
        <div class="card-desc">Track tasks</div>
        <div class="card-badge" id="wsTodoBadge"></div>
      </div>
      <div class="ws-card notes" onclick="goTo('notes')">
        <div class="card-icon">✎</div>
        <div class="card-title">Notes</div>
        <div class="card-desc">Capture ideas</div>
        <div class="card-badge" id="wsNoteBadge"></div>
      </div>
    </div>
  </div>

  <!-- ═══ TODOS ═══ -->
  <div class="screen" id="todosScreen">
    <button class="screen-back-title" id="todoScreenTitle" onclick="goTo('workspace')"></button>
    <div class="filters" id="todoFilters">
      <button class="add-task-inline" onclick="openTaskModal()">+ Add</button>
      <div class="count" id="todoCount"></div>
      <button class="active" data-filter="all">All</button>
      <button data-filter="active">Active</button>
      <button data-filter="done">Done</button>
    </div>
    <div class="todo-list" id="todoList"></div>
  </div>

  <!-- ═══ TASK MODAL ═══ -->
  <div class="modal-overlay" id="taskModal" onclick="closeTaskModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title" id="taskModalTitle">New Task</div>
        <button class="modal-close" onclick="closeTaskModal()">&times;</button>
      </div>
      <div class="modal-body">
        <label class="modal-label">Task name <span class="required">*</span></label>
        <input class="text-input modal-input" type="text" id="todoInput" placeholder="What needs to be done?">
        <label class="modal-label">Details <span class="optional">(optional)</span></label>
        <textarea class="modal-textarea" id="todoDetails" placeholder="Add any extra details..."></textarea>
        <label class="modal-label">Due date <span class="optional">(optional)</span></label>
        <input class="date-input modal-date" type="date" id="todoDue">
      </div>
      <div class="modal-footer">
        <button class="btn modal-cancel" onclick="closeTaskModal()">Cancel</button>
        <button class="btn green" id="taskModalSubmit" onclick="saveTodo()">Add Task</button>
      </div>
    </div>
  </div>

  <!-- ═══ PROJECT MODAL ═══ -->
  <div class="modal-overlay" id="projectModal" onclick="closeProjectModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title" style="color:var(--accent)">New Project</div>
        <button class="modal-close" onclick="closeProjectModal()">&times;</button>
      </div>
      <div class="modal-body">
        <label class="modal-label">Project name <span class="required">*</span></label>
        <input class="text-input modal-input" type="text" id="projectInput" placeholder="e.g. Summer Roadtrip, Book Club...">
      </div>
      <div class="modal-footer">
        <button class="btn modal-cancel" onclick="closeProjectModal()">Cancel</button>
        <button class="btn green" onclick="addProject()">Create</button>
      </div>
    </div>
  </div>

  <!-- ═══ NOTES ═══ -->
  <div class="screen" id="notesScreen">
    <button class="screen-back-title" id="noteScreenTitle" onclick="goTo('workspace')"></button>
    <button class="add-note-btn" onclick="openNoteModal()">
      <span class="add-note-plus">+</span> Add Note
    </button>
    <div class="notes-list" id="notesList"></div>
  </div>

  <!-- ═══ NOTE MODAL ═══ -->
  <div class="modal-overlay" id="noteModal" onclick="closeNoteModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title" id="noteModalTitle" style="color:var(--accent2)">New Note</div>
        <button class="modal-close" onclick="closeNoteModal()">&times;</button>
      </div>
      <div class="modal-body">
        <label class="modal-label">Title <span class="required">*</span></label>
        <input class="text-input modal-input blue-focus" type="text" id="noteTitle" placeholder="Give it a title...">
        <label class="modal-label">Content <span class="optional">(optional)</span></label>
        <textarea class="modal-textarea modal-textarea-blue" id="noteBody" placeholder="Write your note here..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn modal-cancel" onclick="closeNoteModal()">Cancel</button>
        <button class="btn blue" id="noteModalSubmit" onclick="saveNote()">Save Note</button>
      </div>
    </div>
  </div>

  <!-- ═══ CALENDAR MODAL ═══ -->
  <div class="modal-overlay" id="calendarModal" onclick="closeCalendar(event)">
    <div class="modal cal-modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title" style="color:var(--accent)">Calendar</div>
        <button class="modal-close" onclick="closeCalendar()">&times;</button>
      </div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
        <div class="cal-month-label" id="calMonthLabel"></div>
        <button class="cal-nav-btn" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-day-tasks" id="calDayTasks"></div>
    </div>
  </div>

</div>

<script>
  // ── Palette for project dots ──
  const COLORS = ['#c4f04d','#6c8cff','#ff6b8a','#ffa64d','#8b5cf6','#2dd4bf','#f472b6','#facc15'];

  // ── Helpers ──
  function todayStr() { return new Date().toISOString().split('T')[0]; }
  function addDays(n) { const d = new Date(); d.setDate(d.getDate() + n); return d.toISOString().split('T')[0]; }

  // ══════════════════════════════════════════════
  // APP STATE — single source of truth for all
  // persistent data. Eventually saved/loaded as JSON.
  //
  // All mutations go through appState (or via
  // currentProject, which is a reference into
  // appState.projects). Project order in the array
  // IS the display order (drag-to-reorder modifies
  // this array directly).
  // ══════════════════════════════════════════════
  const appState = {
    nextProjectId: 3,
    projects: [
      {
        id: 1, name: 'Italy 2026', color: COLORS[0],
        nextTodoId: 4, nextNoteId: 2,
        todos: [
          { id: 1, text: 'Book flights to Rome', done: false, details: 'Check Skyscanner and Google Flights for deals', due: addDays(3) },
          { id: 2, text: 'Research Amalfi Coast hotels', done: false, details: null, due: addDays(7) },
          { id: 3, text: 'Get travel insurance', done: true, details: 'Compare World Nomads vs SafetyWing', due: addDays(-2) },
        ],
        notes: [
          { id: 1, title: 'Packing List', body: 'Passport, adapters, comfortable shoes\nLight layers for spring weather', time: Date.now() - 7200000 },
        ],
      },
      {
        id: 2, name: 'Fav Movies', color: COLORS[1],
        nextTodoId: 3, nextNoteId: 2,
        todos: [
          { id: 1, text: 'Watch Interstellar again', done: false, details: null, due: todayStr() },
          { id: 2, text: 'Add Dune Part Two to list', done: true, details: null, due: null },
        ],
        notes: [
          { id: 1, title: 'Must Watch', body: 'The Substance\nAnora\nPast Lives', time: Date.now() - 86400000 },
        ],
      },
    ],
  };

  // ── State Persistence Helpers ──

  // Schema version — bump if structure changes
  const STATE_VERSION = 1;

  // Returns a JSON string of the full app state
  function exportState() {
    return JSON.stringify({ version: STATE_VERSION, ...appState }, null, 2);
  }

  // Loads state from a JSON string, replacing current state
  function importState(json) {
    try {
      const data = JSON.parse(json);
      // Accept both versioned and unversioned formats
      if (!data.projects || !Array.isArray(data.projects)) return false;
      if (typeof data.nextProjectId !== 'number') return false;

      // Version check for future migrations
      if (data.version && data.version > STATE_VERSION) {
        console.warn('State version', data.version, 'is newer than supported', STATE_VERSION);
      }

      // Validate each project has required fields
      for (const p of data.projects) {
        if (typeof p.id !== 'number' || typeof p.name !== 'string') return false;
        if (!p.color || typeof p.color !== 'string') return false;
        if (!Array.isArray(p.todos) || !Array.isArray(p.notes)) return false;
        if (typeof p.nextTodoId !== 'number' || typeof p.nextNoteId !== 'number') return false;

        // Validate & normalize todos
        for (const t of p.todos) {
          if (typeof t.id !== 'number' || typeof t.text !== 'string') return false;
          if (typeof t.done !== 'boolean') return false;
          if (!('details' in t)) t.details = null;
          if (!('due' in t)) t.due = null;
        }

        // Validate & normalize notes
        for (const n of p.notes) {
          if (typeof n.id !== 'number' || typeof n.title !== 'string') return false;
          if (typeof n.time !== 'number') return false;
          if (!('body' in n)) n.body = '';
        }
      }

      appState.nextProjectId = data.nextProjectId;
      appState.projects = data.projects;
      currentProject = null;
      goTo('projects');
      stateChanged();
      return true;
    } catch (e) {
      console.error('importState failed:', e);
      return false;
    }
  }

  // Verify round-trip on init (dev check)
  (function verifyStateSerialization() {
    const json = exportState();
    const parsed = JSON.parse(json);

    // Check top-level keys
    const requiredKeys = ['version', 'nextProjectId', 'projects'];
    const missing = requiredKeys.filter(k => !(k in parsed));
    if (missing.length) { console.warn('appState missing keys:', missing); return; }

    // Check each project
    parsed.projects.forEach((p, i) => {
      const pKeys = ['id','name','color','nextTodoId','nextNoteId','todos','notes'];
      const pmissing = pKeys.filter(k => !(k in p));
      if (pmissing.length) console.warn(`Project ${i} missing:`, pmissing);

      p.todos.forEach((t, j) => {
        const tKeys = ['id','text','done','details','due'];
        const tmissing = tKeys.filter(k => !(k in t));
        if (tmissing.length) console.warn(`Project ${i} todo ${j} missing:`, tmissing);
      });

      p.notes.forEach((n, j) => {
        const nKeys = ['id','title','body','time'];
        const nmissing = nKeys.filter(k => !(k in n));
        if (nmissing.length) console.warn(`Project ${i} note ${j} missing:`, nmissing);
      });
    });

    // Full round-trip: export → parse → re-export should be identical
    const reExport = JSON.stringify({ version: STATE_VERSION, ...JSON.parse(json) }, null, 2);
    const rt = JSON.stringify(JSON.parse(reExport));
    const orig = JSON.stringify(JSON.parse(json));
    if (rt !== orig) {
      console.error('Round-trip mismatch! Data may be lost on save/load.');
    } else {
      console.log('✓ State schema valid, round-trip OK (' + parsed.projects.length + ' projects, ' +
        parsed.projects.reduce((s, p) => s + p.todos.length, 0) + ' todos, ' +
        parsed.projects.reduce((s, p) => s + p.notes.length, 0) + ' notes)');
    }
  })();

  // Called after every state mutation — wire up persistence here later
  function stateChanged() {
    // Verify state is serializable on every change
    try {
      const json = exportState();
      const parsed = JSON.parse(json);
      if (!parsed.projects || typeof parsed.nextProjectId !== 'number') {
        console.error('State corruption detected!');
      }
    } catch (e) {
      console.error('State not serializable:', e);
    }
    // Uncomment below for persistence:

  }

  // ── Navigation ──
  function goTo(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const map = { projects: 'projectsScreen', workspace: 'workspaceScreen', todos: 'todosScreen', notes: 'notesScreen' };
    document.getElementById(map[screen]).classList.add('active');

    if (screen === 'projects') { currentProject = null; renderProjects(); renderCurrentDate(); renderUpcoming(); }
    else if (screen === 'workspace') { renderWorkspace(); }
    else if (screen === 'todos') { todoFilter = 'all'; document.querySelectorAll('#todoFilters button').forEach(b => b.classList.remove('active')); document.querySelector('#todoFilters button[data-filter="all"]').classList.add('active'); renderTodos(); renderTodoMeta(); }
    else if (screen === 'notes') { renderNotes(); renderNoteMeta(); }

  // ── Projects ──
  function addProject() {
    const name = projectInput.value.trim();
    if (!name) return;
    const id = appState.nextProjectId++;
    const color = COLORS[(id - 1) % COLORS.length];
    appState.projects.push({ id, name, color, todos: [], notes: [], nextTodoId: 1, nextNoteId: 1 });
    newProjectId = id;
    projectModal.classList.remove('open');
    renderProjects();
    newProjectId = null;
    stateChanged();
  }

  function openProject(id) {
    if (didDrag) { didDrag = false; return; }
    currentProject = appState.projects.find(p => p.id === id);
    if (currentProject) goTo('workspace');
  }

  function openProjectTodos(id) {
    currentProject = appState.projects.find(p => p.id === id);
    if (currentProject) goTo('todos');
  }

  function deleteProject(e, id) {
    e.stopPropagation();
    if (confirmingDeleteId === id) {
      // Already confirming — actually delete
      const el = document.querySelector(`.project-card[data-id="${id}"]`);
      if (el) {
        el.classList.add('removing');
        setTimeout(() => { appState.projects = appState.projects.filter(p => p.id !== id); confirmingDeleteId = null; renderProjects(); stateChanged(); }, 250);
      }
    } else {
      confirmingDeleteId = id;
      renderProjects();
      // Auto-cancel after 3 seconds
      setTimeout(() => { if (confirmingDeleteId === id) { confirmingDeleteId = null; renderProjects(); } }, 3000);
    }
  }

  function cancelDelete(e, id) {
    e.stopPropagation();
    confirmingDeleteId = null;
    renderProjects();
  }

  function renderProjects() {
    if (appState.projects.length === 0) {
      projectsList.innerHTML = `<div class="empty"><div class="empty-icon">📁</div><p>Create your first project above</p></div>`;
      return;
    }
    projectsList.innerHTML = appState.projects.map((p, idx) => {
      const active = p.todos.filter(t => !t.done).length;
      const meta = [];
      if (p.todos.length) meta.push(`${active} active task${active !== 1 ? 's' : ''}`);
      if (p.notes.length) meta.push(`${p.notes.length} note${p.notes.length !== 1 ? 's' : ''}`);
      const isConfirming = confirmingDeleteId === p.id;
      return `
      <div class="project-card ${p.id === newProjectId ? 'new' : ''} ${isConfirming ? 'confirming' : ''}" data-id="${p.id}" data-idx="${idx}" draggable="true" onclick="${isConfirming ? '' : `openProject(${p.id})`}">
        <div class="drag-handle" title="Drag to reorder" onclick="event.stopPropagation()">⠿</div>
        <div class="project-color" style="background:${p.color}"></div>
        <div class="project-info">
          <div class="project-name">${escHtml(p.name)}</div>
          <div class="project-meta">${isConfirming ? '<span style="color:var(--danger)">Delete this project?</span>' : (meta.length ? meta.join(' · ') : 'Empty project')}</div>
        </div>
        ${isConfirming ? `
          <button class="confirm-del-btn yes" onclick="deleteProject(event,${p.id})" title="Confirm delete">Delete</button>
          <button class="confirm-del-btn no" onclick="cancelDelete(event,${p.id})" title="Cancel">Cancel</button>
        ` : `
          <button class="project-delete" onclick="deleteProject(event,${p.id})" title="Delete project">✕</button>
        `}
      </div>`;
    }).join('');

    // Attach drag events
    projectsList.querySelectorAll('.project-card').forEach(card => {
      card.addEventListener('dragstart', onDragStart);
      card.addEventListener('dragover', onDragOver);
      card.addEventListener('dragend', onDragEnd);
      card.addEventListener('drop', onDrop);
    });
  }

  // ── Drag & Drop for Projects ──
  let dragSrcIdx = null;
  let didDrag = false;

  function onDragStart(e) {
    dragSrcIdx = parseInt(this.dataset.idx);
    didDrag = true;
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragSrcIdx);
  }

  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const card = this;
    const rect = card.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    card.classList.remove('drag-above', 'drag-below');
    if (e.clientY < midY) {
      card.classList.add('drag-above');
    } else {
      card.classList.add('drag-below');
    }
  }

  function onDrop(e) {
    e.preventDefault();
    const targetIdx = parseInt(this.dataset.idx);
    if (dragSrcIdx !== null && dragSrcIdx !== targetIdx) {
      const [moved] = appState.projects.splice(dragSrcIdx, 1);
      appState.projects.splice(targetIdx, 0, moved);
      renderProjects();
      stateChanged();
    }
    clearDragStates();
  }

  function onDragEnd() {
    clearDragStates();
    setTimeout(() => { didDrag = false; }, 50);
  }

  function clearDragStates() {
    dragSrcIdx = null;
    projectsList.querySelectorAll('.project-card').forEach(c => {
      c.classList.remove('dragging', 'drag-above', 'drag-below');
    });
  }

  // ── Workspace ──
  function renderWorkspace() {
    if (!currentProject) return;
    document.getElementById('wsTitle').textContent = currentProject.name;
    document.getElementById('wsTitle').style.color = currentProject.color;
    const active = currentProject.todos.filter(t => !t.done).length;
    document.getElementById('wsTodoBadge').textContent = `${active} active`;
    document.getElementById('wsNoteBadge').textContent = `${currentProject.notes.length} note${currentProject.notes.length !== 1 ? 's' : ''}`;
  }

  // ── Todos ──
  function renderTodoMeta() {
    if (!currentProject) return;
    document.getElementById('todoScreenTitle').textContent = currentProject.name;
  }

  function saveTodo() {
    if (!currentProject) return;
    const text = todoInput.value.trim();
    if (!text) return;
    const details = todoDetails.value.trim() || null;
    const due = todoDue.value || null;

    if (editingTodoId !== null) {
      // Edit existing
      const t = currentProject.todos.find(t => t.id === editingTodoId);
      if (t) { t.text = text; t.details = details; t.due = due; }
      editingTodoId = null;
    } else {
      // Create new
      const id = currentProject.nextTodoId++;
      currentProject.todos.unshift({ id, text, done: false, details, due });
      newTodoId = id;
    }
    taskModal.classList.remove('open');
    renderTodos();
    newTodoId = null;
    stateChanged();
  }

  function toggleTodo(id) {
    if (!currentProject) return;
    const t = currentProject.todos.find(t => t.id === id);
    if (t) t.done = !t.done;
    renderTodos();
    stateChanged();
  }

  function deleteTodo(id) {
    if (!currentProject) return;
    const el = document.querySelector(`.todo-item[data-id="${id}"]`);
    if (el) {
      el.classList.add('removing');
      setTimeout(() => { currentProject.todos = currentProject.todos.filter(t => t.id !== id); renderTodos(); stateChanged(); }, 250);
    }
  }

  function renderTodos() {
    if (!currentProject) return;
    const todos = currentProject.todos;
    const filtered = todos.filter(t =>
      todoFilter === 'all' ? true : todoFilter === 'active' ? !t.done : t.done
    ).sort((a, b) => a.text.localeCompare(b.text, undefined, { numeric: true, sensitivity: 'base' }));
    todoCount.textContent = `${todos.filter(t => !t.done).length} remaining`;

    if (filtered.length === 0) {
      todoList.innerHTML = `<div class="empty"><div class="empty-icon">✓</div><p>${
        todoFilter === 'done' ? 'Nothing completed yet' : todoFilter === 'active' ? 'All done!' : 'Add your first task above'
      }</p></div>`;
      return;
    }
    todoList.innerHTML = filtered.map(t => `
      <div class="todo-item ${t.done ? 'done' : ''} ${t.id === newTodoId ? 'new' : ''}" data-id="${t.id}">
        <div class="check ${t.done ? 'checked' : ''}" onclick="toggleTodo(${t.id})"></div>
        <div class="todo-content" onclick="editTodo(${t.id})" style="cursor:pointer">
          <div class="todo-text">${escHtml(t.text)}</div>
          ${t.details ? `<div class="todo-details">${escHtml(t.details)}</div>` : ''}

  // ── Notes ──
  function renderNoteMeta() {
    if (!currentProject) return;
    document.getElementById('noteScreenTitle').textContent = currentProject.name;
  }

  function saveNote() {
    if (!currentProject) return;
    const title = noteTitleInput.value.trim();
    const body = noteBodyInput.value.trim();
    if (!title && !body) return;

    if (editingNoteId !== null) {
      // Edit existing
      const n = currentProject.notes.find(n => n.id === editingNoteId);
      if (n) { n.title = title || 'Untitled'; n.body = body || ''; n.time = Date.now(); }
      editingNoteId = null;
    } else {
      // Create new
      const id = currentProject.nextNoteId++;
      currentProject.notes.unshift({ id, title: title || 'Untitled', body: body || '', time: Date.now() });
      newNoteId = id;

    noteModal.classList.remove('open');
    renderNotes();
    newNoteId = null;
    stateChanged();

  function deleteNote(id) {
    if (!currentProject) return;
    const el = document.querySelector(`.note-card[data-id="${id}"]`);
    if (el) {
      el.classList.add('removing');
      setTimeout(() => { currentProject.notes = currentProject.notes.filter(n => n.id !== id); renderNotes(); stateChanged(); }, 250);
    }

    if (!currentProject) return;
    if (currentProject.notes.length === 0) {
      notesList.innerHTML = `<div class="empty"><div class="empty-icon">✎</div><p>Write your first note above</p></div>`;
      return;
    }
    const sorted = [...currentProject.notes].sort((a, b) => a.title.localeCompare(b.title, undefined, { numeric: true, sensitivity: 'base' }));
    notesList.innerHTML = sorted.map(n => `
      <div class="note-card ${n.id === newNoteId ? 'new' : ''}" data-id="${n.id}" onclick="editNote(${n.id})" style="cursor:pointer">

        <div class="note-time">${fmtTime(n.time)}</div>
      </div>
    `).join('');
  }

  // ── Helpers ──
  function fmtTime(ts) {
    const diff = Date.now() - ts;
    if (diff < 60000) return 'Just now';
    if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
    return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function daysDiff(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(dateStr + 'T00:00:00'); target.setHours(0,0,0,0);
    return Math.round((target - today) / 86400000);
  }

  function dueBadgeClass(dateStr) {
    const d = daysDiff(dateStr);
    if (d < 0) return 'overdue';
    if (d === 0) return 'today';
    if (d <= 7) return 'soon';
    return 'later';
  }

  function fmtDue(dateStr) {
    const d = daysDiff(dateStr);
    if (d < -1) return `${Math.abs(d)}d overdue`;
    if (d === -1) return 'Yesterday';
    if (d === 0) return 'Today';
    if (d === 1) return 'Tomorrow';
    if (d <= 7) return `In ${d} days`;
    return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function renderCurrentDate() {
    const now = new Date();
    document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
    });
  }

  function renderUpcoming() {
    // Gather all undone todos with due dates across all projects, due within 7 days (or overdue)
    const upcoming = [];
    appState.projects.forEach(p => {
      p.todos.forEach(t => {
        if (!t.done && t.due) {
          const d = daysDiff(t.due);
          if (d <= 7) {
            upcoming.push({ ...t, projectName: p.name, projectColor: p.color, projectId: p.id, _days: d });
          }
        }
      });
    });

    if (upcoming.length === 0) {
      upcomingSection.innerHTML = '';
      return;
    }

    // Sort: overdue first, then soonest
    upcoming.sort((a, b) => a._days - b._days);

    upcomingSection.innerHTML = `
      <div class="upcoming-section">
        <div class="upcoming-title"><span class="upcoming-icon"><svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer octagonal frame -->
          <polygon points="14,1 21,3.5 25,9 26,14 25,19 21,24.5 14,27 7,24.5 3,19 2,14 3,9 7,3.5" stroke="rgba(196,240,77,0.5)" stroke-width="1" fill="none"/>
          <!-- Inner octagonal frame -->
          <polygon points="14,4 19,6 22,10 23,14 22,18 19,22 14,24 9,22 6,18 5,14 6,10 9,6" stroke="rgba(196,240,77,0.25)" stroke-width="0.6" fill="none"/>
          <!-- Clock face circle -->
          <circle cx="14" cy="14" r="7.5" stroke="rgba(196,240,77,0.35)" stroke-width="0.6" fill="rgba(196,240,77,0.03)"/>
          <!-- Hour markers - deco style lines -->
          <line x1="14" y1="7" x2="14" y2="8.5" stroke="rgba(196,240,77,0.6)" stroke-width="1" stroke-linecap="round"/>
          <line x1="14" y1="19.5" x2="14" y2="21" stroke="rgba(196,240,77,0.6)" stroke-width="1" stroke-linecap="round"/>
          <line x1="7" y1="14" x2="8.5" y2="14" stroke="rgba(196,240,77,0.6)" stroke-width="1" stroke-linecap="round"/>
          <line x1="19.5" y1="14" x2="21" y2="14" stroke="rgba(196,240,77,0.6)" stroke-width="1" stroke-linecap="round"/>
          <!-- Small diamond markers at diagonals -->
          <rect x="18.2" y="8.5" width="1.6" height="1.6" transform="rotate(45 19 9.3)" fill="rgba(196,240,77,0.3)"/>
          <rect x="8.2" y="18" width="1.6" height="1.6" transform="rotate(45 9 18.8)" fill="rgba(196,240,77,0.3)"/>
          <rect x="18.2" y="18" width="1.6" height="1.6" transform="rotate(45 19 18.8)" fill="rgba(196,240,77,0.3)"/>
          <rect x="8.2" y="8.5" width="1.6" height="1.6" transform="rotate(45 9 9.3)" fill="rgba(196,240,77,0.3)"/>
          <!-- Hour hand -->
          <line x1="14" y1="14" x2="14" y2="9.5" stroke="rgba(196,240,77,0.8)" stroke-width="1.2" stroke-linecap="round"/>
          <!-- Minute hand -->
          <line x1="14" y1="14" x2="18" y2="11.5" stroke="rgba(196,240,77,0.6)" stroke-width="0.8" stroke-linecap="round"/>
          <!-- Center dot -->
          <circle cx="14" cy="14" r="1.2" fill="rgba(196,240,77,0.7)"/>
          <!-- Deco rays at corners of outer frame -->
          <line x1="4" y1="4" x2="6.5" y2="6.5" stroke="rgba(108,140,255,0.2)" stroke-width="0.5"/>
          <line x1="24" y1="4" x2="21.5" y2="6.5" stroke="rgba(108,140,255,0.2)" stroke-width="0.5"/>
          <line x1="4" y1="24" x2="6.5" y2="21.5" stroke="rgba(108,140,255,0.2)" stroke-width="0.5"/>
          <line x1="24" y1="24" x2="21.5" y2="21.5" stroke="rgba(108,140,255,0.2)" stroke-width="0.5"/>
        </svg></span> Due Soon <button class="cal-toggle-btn" onclick="openCalendar()" title="Calendar view"><svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer deco frame -->
          <rect x="2" y="4" width="24" height="22" rx="1" stroke="rgba(196,240,77,0.45)" stroke-width="1" fill="none"/>
          <rect x="4" y="6" width="20" height="18" rx="0.5" stroke="rgba(196,240,77,0.2)" stroke-width="0.5" fill="none"/>
          <!-- Header bar -->
          <rect x="2" y="4" width="24" height="6" rx="1" fill="rgba(196,240,77,0.1)" stroke="rgba(196,240,77,0.35)" stroke-width="0.5"/>
          <!-- Calendar hooks -->
          <line x1="9" y1="2" x2="9" y2="6" stroke="rgba(196,240,77,0.6)" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="19" y1="2" x2="19" y2="6" stroke="rgba(196,240,77,0.6)" stroke-width="1.2" stroke-linecap="round"/>
          <!-- Grid dots -->
          <circle cx="8.5" cy="15" r="1.2" fill="rgba(196,240,77,0.4)"/>
          <circle cx="14" cy="15" r="1.2" fill="rgba(108,140,255,0.5)"/>
          <circle cx="19.5" cy="15" r="1.2" fill="rgba(196,240,77,0.4)"/>
          <circle cx="8.5" cy="20" r="1.2" fill="rgba(108,140,255,0.5)"/>
          <circle cx="14" cy="20" r="1.2" fill="rgba(196,240,77,0.3)"/>
          <!-- Corner accents -->
          <line x1="2" y1="4" x2="4.5" y2="6.5" stroke="rgba(108,140,255,0.15)" stroke-width="0.5"/>
          <line x1="26" y1="4" x2="23.5" y2="6.5" stroke="rgba(108,140,255,0.15)" stroke-width="0.5"/>
        </svg></button></div>
        ${upcoming.map(t => `
          <div class="upcoming-item" onclick="openProjectTodos(${t.projectId})">
            <div class="upcoming-dot" style="background:${t.projectColor}"></div>
            <div class="upcoming-info">
              <div class="upcoming-task-text">${escHtml(t.text)}</div>
              <div class="upcoming-project-label">${escHtml(t.projectName)}</div>
            </div>
            <span class="upcoming-due ${dueBadgeClass(t.due)}">${fmtDue(t.due)}</span>
          </div>
        `).join('')}
      </div>`;
  }

  // ── Calendar ──
  const calendarModal = document.getElementById('calendarModal');
  const calGrid = document.getElementById('calGrid');
  const calMonthLabel = document.getElementById('calMonthLabel');
  const calDayTasks = document.getElementById('calDayTasks');
  let calYear, calMonth, calSelectedDate = null;

  function openCalendar() {
    const now = new Date();
    calYear = now.getFullYear();
    calMonth = now.getMonth();
    calSelectedDate = todayStr();
    calendarModal.classList.add('open');
    renderCalendar();
  }

  function closeCalendar(e) {
    if (e && e.target !== calendarModal) return;
    calendarModal.classList.remove('open');
  }

  function calNav(dir) {
    calMonth += dir;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
  }

  function getDueTasks() {
    // Build a map: dateStr -> [{ text, done, projectName, projectColor, projectId }]
    const map = {};
    appState.projects.forEach(p => {
      p.todos.forEach(t => {
        if (t.due) {
          if (!map[t.due]) map[t.due] = [];
          map[t.due].push({
            text: t.text, done: t.done,
            projectName: p.name, projectColor: p.color, projectId: p.id
          });
        }
      });
    });
    return map;
  }

  function renderCalendar() {
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    calMonthLabel.textContent = `${monthNames[calMonth]} ${calYear}`;

    const dueMap = getDueTasks();
    const today = todayStr();
    const firstDay = new Date(calYear, calMonth, 1);
    const lastDay = new Date(calYear, calMonth + 1, 0);
    const startDow = firstDay.getDay(); // 0=Sun
    const daysInMonth = lastDay.getDate();
    const prevLast = new Date(calYear, calMonth, 0).getDate();

    // Header
    let html = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d =>
      `<div class="cal-header-cell">${d}</div>`
    ).join('');

    // Previous month trailing days
    for (let i = startDow - 1; i >= 0; i--) {
      const day = prevLast - i;
      const m = calMonth === 0 ? 11 : calMonth - 1;
      const y = calMonth === 0 ? calYear - 1 : calYear;
      const ds = `${y}-${String(m + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      html += calCellHtml(day, ds, dueMap, today, true);
    }

    // Current month
    for (let day = 1; day <= daysInMonth; day++) {
      const ds = `${calYear}-${String(calMonth + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      html += calCellHtml(day, ds, dueMap, today, false);
    }

    // Next month leading days
    const totalCells = startDow + daysInMonth;
    const remaining = (7 - (totalCells % 7)) % 7;
    for (let day = 1; day <= remaining; day++) {
      const m = calMonth === 11 ? 0 : calMonth + 1;
      const y = calMonth === 11 ? calYear + 1 : calYear;
      const ds = `${y}-${String(m + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      html += calCellHtml(day, ds, dueMap, today, true);
    }

    calGrid.innerHTML = html;
    renderCalDayTasks();
  }

  function calCellHtml(day, ds, dueMap, today, otherMonth) {
    const tasks = dueMap[ds] || [];
    const isToday = ds === today;
    const isSelected = ds === calSelectedDate;
    const cls = [
      'cal-cell',
      otherMonth ? 'other-month' : '',
      isToday ? 'today' : '',
      isSelected ? 'selected' : '',
      tasks.length ? 'has-tasks' : ''
    ].filter(Boolean).join(' ');

    // Unique colors for dots (max 4)
    const colors = [...new Set(tasks.map(t => t.projectColor))].slice(0, 4);
    const dots = colors.map(c => `<div class="cal-dot" style="background:${c}"></div>`).join('');

    return `<div class="${cls}" onclick="selectCalDay('${ds}')">
      <span class="cal-day-num">${day}</span>
      ${dots ? `<div class="cal-dots">${dots}</div>` : ''}
    </div>`;
  }

  function selectCalDay(ds) {
    calSelectedDate = ds;
    calGrid.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected'));
    // Find and highlight the clicked cell
    renderCalendar();
  }

  function renderCalDayTasks() {
    if (!calSelectedDate) { calDayTasks.innerHTML = ''; return; }
    const dueMap = getDueTasks();
    const tasks = dueMap[calSelectedDate] || [];
    const d = new Date(calSelectedDate + 'T00:00:00');
    const label = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

    if (tasks.length === 0) {
      calDayTasks.innerHTML = `<div class="cal-day-header">${label}</div><div class="cal-no-tasks">No tasks due</div>`;
      return;
    }

    calDayTasks.innerHTML = `
      <div class="cal-day-header">${label} · ${tasks.length} task${tasks.length !== 1 ? 's' : ''}</div>
      ${tasks.map(t => `
        <div class="cal-task-item ${t.done ? 'done' : ''}" onclick="closeCalendar(); openProjectTodos(${t.projectId})">
          <div class="cal-task-dot" style="background:${t.projectColor}"></div>
          <div class="cal-task-info">
            <div class="cal-task-text">${escHtml(t.text)}</div>
            <div class="cal-task-project">${escHtml(t.projectName)}</div>
          </div>
        </div>
      `).join('')}`;
  }

  renderCurrentDate();
  renderProjects();
  renderUpcoming();
</script>
</body>
